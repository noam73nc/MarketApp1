name: Update Market Data

on:
  schedule:
    # מריץ כל 15 דקות.
    - cron: '*/30 * * * *'
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # הפתרון הקריטי: הגדרת תיקיית העבודה הפנימית עבור כל הפקודות
    defaults:
      run:
        working-directory: ./MarketApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Updater
        run: python data_updater.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/*.pkl
          git commit -m "🤖 Auto-update market data files" || echo "No data changes to commit"
          git push
